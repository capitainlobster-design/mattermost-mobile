name: Build Android Debug APK

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies (skip solidarity preinstall check)
        run: npm ci --ignore-scripts

      - name: Apply patches and run postinstall
        run: |
          npx patch-package
          ./scripts/postinstall.sh

      - name: Place google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Generate debug keystore for release signing
        run: |
          keytool -genkey -v \
            -keystore android/app/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug, O=Android, C=US" \
            -storepass android -keypass android -noprompt

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK (signed with debug keystore, no Metro)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mattermost-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
